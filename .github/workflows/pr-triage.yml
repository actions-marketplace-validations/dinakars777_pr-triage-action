# Self-test workflow for this action repository.
# The README contains the copy/paste workflow for downstream repositories.

name: PR Triage

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out action
        uses: actions/checkout@v4

      - name: Triage PR
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-labels: true
          enable-duplicate-check: true
          enable-contributor-profile: true
          duplicate-threshold: 50
